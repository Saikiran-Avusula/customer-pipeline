version: "3.8"

services:

  # PostgreSQL database
  # Same as having a local MySQL running for Spring Boot
  postgres:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask mock server — serves customers.json as REST API
  mock-server:
    build: ./mock-server
    container_name: mock_server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  # FastAPI pipeline service — ingests from Flask, stores in PostgreSQL
  pipeline-service:
    build: ./pipeline-service
    container_name: pipeline_service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db